# KataGo analysis — Render Free 512MB / 교육용 초저지연 응수
# API 요청 maxVisits·maxTime(overrideSettings)으로 덮어씀

logDir = analysis_logs
logSearchInfo = false
logAllRequests = false
logAllResponses = false

reportAnalysisWinratesAs = SIDETOMOVE

# 교육용 기본: 짧은 탐색 (프론트/API는 보통 12 visits, 0.25s)
maxVisits = 12
maxTime = 0.3

numAnalysisThreads = 1
numSearchThreadsPerAnalysisThread = 1

nnMaxBatchSize = 2
numNNServerThreadsPerModel = 1

# 캐시 축소 (512MB 여유). 11 ≈ 2K entries
nnCacheSizePowerOfTwo = 11
nnMutexPoolSizePowerOfTwo = 11

# Analysis 엔진은 pondering 없음 (GTP 전용). 오프라인 탐색 없음.
