# KataGo analysis — Render Free 512MB / 응수 1수 전용
# includeOwnership=false 요청과 함께 사용 (소유권 미요청 시 캐시 절반)

logDir = analysis_logs
logSearchInfo = false
logAllRequests = false
logAllResponses = false

reportAnalysisWinratesAs = SIDETOMOVE

# 응수 1~3수면 충분
maxVisits = 25

numAnalysisThreads = 1
numSearchThreadsPerAnalysisThread = 1

nnMaxBatchSize = 4
numNNServerThreadsPerModel = 1

# 기본 cpu 이미지는 20 (~1M entries, 512MB에서 OOM). 12 ≈ 6MB 캐시.
nnCacheSizePowerOfTwo = 12
nnMutexPoolSizePowerOfTwo = 12
